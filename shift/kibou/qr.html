<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>休み希望はスマホから | かえりえ</title>
<style>
:root{
  --ink:#090401; --ocean:#91B9C1; --sky:#C3DCF0; --sand:#C19569;
  --mist:#D8DDE1; --mint:#EBF4F8; --green:#5F8C8A; --gray:#6B7880; --white:#FFFFFF;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  background:var(--mint);color:var(--ink);line-height:1.7;
  display:flex;justify-content:center;padding:20px;
}
.poster{
  background:var(--white);
  width:100%;max-width:640px;
  border:1px solid var(--mist);border-radius:16px;
  padding:36px 32px;text-align:center;
}
h1{
  font-size:1.7rem;letter-spacing:-0.02em;line-height:1.4;
  border-bottom:4px solid var(--ocean);padding-bottom:14px;margin-bottom:20px;
}
.qr{width:min(320px, 70vw);height:auto;margin:10px auto;display:block;}
.url{
  font-size:0.85rem;color:var(--gray);word-break:break-all;
  background:var(--mint);border-radius:8px;padding:6px 10px;margin:10px 0 24px;
}
ol{
  text-align:left;display:inline-block;font-size:1.05rem;font-weight:500;
  margin-bottom:20px;
}
ol li{padding:4px 0;}
.rules{
  background:var(--mint);border-radius:12px;padding:14px 18px;
  text-align:left;font-size:0.9rem;
}
.rules b{color:var(--green);}
.print-btn{
  margin-top:20px;min-height:48px;padding:10px 26px;
  border:none;border-radius:10px;background:var(--green);color:var(--white);
  font-size:0.95rem;font-weight:700;font-family:inherit;cursor:pointer;
}
@media print{
  body{background:var(--white);padding:0;}
  .poster{border:none;max-width:none;}
  .print-btn{display:none;}
  @page{size:A4 portrait;margin:15mm;}
}
</style>
</head>

    <li>スマホのカメラでQRコードを読み取る</li>
    <li>事業所と自分の名前を選ぶ</li>
    <li>休みたい日をタップして「送信」</li>

  <div class="rules">
    <b>■ 締切</b>: 翌月分は <b>今月10日まで</b>(過ぎると入力できません)<br>
    <b>■ 日数</b>: 入力できる日数は事業所ごとに決まっています(画面に表示されます)<br>
    <b>■ やり直し</b>: 締切までなら何度でも出し直せます(最後に送った内容が有効)
  </div>
